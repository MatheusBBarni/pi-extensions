name: Publish npm packages

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - pi-goal-extension/**
      - pi-message-queue/**
      - .github/workflows/publish.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check packages
        run: npm run check

      - name: Verify package contents
        run: npm run pack:dry-run

      - name: Publish unpublished package versions
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          for package_json in pi-goal-extension/package.json pi-message-queue/package.json; do
            name=$(node -p "require('./${package_json}').name")
            version=$(node -p "require('./${package_json}').version")

            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "::notice title=Already published::${name}@${version} already exists on npm; skipping."
              continue
            fi

            if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
              echo "::error::Missing NPM_TOKEN repository secret. Add an npm automation token as NPM_TOKEN to publish ${name}@${version}."
              exit 1
            fi

            echo "Publishing ${name}@${version}"
            npm publish --workspace "${name}" --access public
          done
